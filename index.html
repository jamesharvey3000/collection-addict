<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#131110">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Track your collections — whiskey, cigars, pipes, hats, and more.">
  <title>Collection Addict</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="auth-page" style="opacity:0">

  <div id="app">

    <aside id="sidebar">
      <div class="sidebar-logo">
        <img src="img/logo.png" alt="Collection Addict" class="sidebar-logo-img">
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="home">
          <i class="fa-solid fa-house"></i><span>Home</span>
        </button>
        <button class="nav-item" data-view="search">
          <i class="fa-solid fa-magnifying-glass"></i><span>Search</span>
        </button>
        <button class="nav-item" data-view="add">
          <i class="fa-solid fa-plus"></i><span>Add Item</span>
        </button>
        <button class="nav-item" data-view="collection">
          <i class="fa-solid fa-layer-group"></i><span>Collection</span>
        </button>
        <button class="nav-item" data-view="wishlist">
          <i class="fa-regular fa-heart"></i><span>Wishlist</span>
        </button>
        <button class="nav-item" data-view="profile">
          <i class="fa-regular fa-user"></i><span>Profile</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item nav-item--logout" id="sidebar-logout">
          <i class="fa-solid fa-right-from-bracket"></i><span>Sign Out</span>
        </button>
        <div class="sidebar-version">v0.1.0</div>
      </div>
    </aside>

    <div id="main-wrap">
      <header id="app-header">
        <div class="header-inner">
          <button class="mobile-menu-btn header-btn" id="mobile-menu-toggle" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <img src="img/logo.png" alt="Collection Addict" class="header-logo">
          <button class="header-btn" id="btn-notifications" aria-label="Notifications">
            <i class="fa-regular fa-bell"></i>
          </button>
        </div>
      </header>

      <main id="view-container"></main>
    </div>

    <nav id="tab-bar">
      <button class="tab active" data-view="home" aria-label="Home">
        <i class="fa-solid fa-house"></i><span>Home</span>
      </button>
      <button class="tab" data-view="search" aria-label="Search">
        <i class="fa-solid fa-magnifying-glass"></i><span>Search</span>
      </button>
      <button class="tab tab-add" data-view="add" aria-label="Add Item">
        <div class="add-ring"><i class="fa-solid fa-plus"></i></div>
      </button>
      <button class="tab" data-view="collection" aria-label="Collection">
        <i class="fa-solid fa-layer-group"></i><span>Collection</span>
      </button>
      <button class="tab" data-view="wishlist" aria-label="Wishlist">
        <i class="fa-regular fa-heart"></i><span>Wish</span>
      </button>
      <button class="tab" data-view="profile" aria-label="Profile">
        <i class="fa-regular fa-user"></i><span>Profile</span>
      </button>
    </nav>

  </div>

  <div id="sidebar-overlay"></div>
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/cat-fields.js"></script>
  <script src="js/router.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/search.js"></script>
  <script src="js/views/add.js"></script>
  <script src="js/views/collection.js"></script>
  <script src="js/views/wishlist.js"></script>
  <script src="js/views/profile.js"></script>
  <script src="js/views/auth.js"></script>
  <script src="js/views/item.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
